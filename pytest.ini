[pytest]
DJANGO_SETTINGS_MODULE = minierp.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

addopts = 
    --verbose
    --strict-markers
    --tb=short
    --reuse-db
    --no-migrations
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=10

# Don't serialize database between test runs
django_db_setup = disable