<section class="space-y-6">
    <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="space-y-4">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div class="inline-flex rounded-2xl bg-gray-100 p-1">
                    <button type="button" class="courier-segment-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-type="b2c">B2C Orders</button>
                    <button type="button" class="courier-segment-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-type="b2b">B2B Orders</button>
                    <button type="button" class="courier-segment-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-type="ftl">FTL Orders</button>
                </div>
                <button type="button" id="courier-open-create-order" class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">Create B2C Order</button>
            </div>
            <div>
                <h2 class="text-xl font-semibold text-gray-900">Courier Orders</h2>
                <p class="text-sm text-gray-500">Create, edit, review, and action courier orders inside the ERP workspace.</p>
            </div>
        </div>
    </div>

    <div id="courier-orders-regular-pane" class="space-y-6">
        <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
                <div class="flex flex-1 flex-col gap-4 lg:flex-row lg:items-center">
                    <div class="relative flex-1">
                        <input id="courier-orders-search" type="text" placeholder="Search order, recipient, pincode, carrier, or AWB" class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm text-gray-700 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                    </div>
                    <div class="inline-flex rounded-2xl bg-gray-100 p-1">
                        <button type="button" class="courier-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-status="all">All</button>
                        <button type="button" class="courier-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-status="draft">Draft</button>
                        <button type="button" class="courier-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-status="booked">Booked</button>
                        <button type="button" class="courier-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-status="manifested">Manifested</button>
                        <button type="button" class="courier-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-orders-status="cancelled">Cancelled</button>
                    </div>
                </div>
                <button type="button" id="courier-orders-refresh" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Refresh</button>
            </div>
            <div id="courier-orders-actions" class="mt-4 hidden flex flex-wrap items-center gap-2 rounded-2xl border border-blue-100 bg-blue-50 p-4">
                <span id="courier-orders-selected-count" class="mr-2 text-sm font-medium text-blue-900">0 selected</span>
                <button type="button" id="courier-order-edit-action" class="rounded-xl bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-100">Edit</button>
                <button type="button" id="courier-order-book-awb-action" class="rounded-xl bg-green-600 px-4 py-2 text-sm font-semibold text-white hover:bg-green-700">Book AWB</button>
                <button type="button" id="courier-order-manifest-action" class="rounded-xl bg-cyan-600 px-4 py-2 text-sm font-semibold text-white hover:bg-cyan-700">Generate Manifest</button>
                <button type="button" id="courier-order-cancel-action" class="rounded-xl bg-orange-600 px-4 py-2 text-sm font-semibold text-white hover:bg-orange-700">Cancel Booking</button>
                <button type="button" id="courier-order-invoice-action" class="rounded-xl bg-purple-600 px-4 py-2 text-sm font-semibold text-white hover:bg-purple-700">Invoice</button>
                <button type="button" id="courier-order-label-action" class="rounded-xl bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">Labels</button>
                <button type="button" id="courier-order-details-action" class="rounded-xl bg-slate-700 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Details</button>
                <button type="button" id="courier-order-track-action" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">Track</button>
                <button type="button" id="courier-order-sync-action" class="rounded-xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-700">Sync Status</button>
                <button type="button" id="courier-order-delete-action" class="rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Delete</button>
            </div>
        </div>

        <div id="courier-orders-list" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
    </div>

    <div id="courier-orders-ftl-pane" class="hidden space-y-6">
        <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                <div class="inline-flex rounded-2xl bg-gray-100 p-1">
                    <button type="button" class="courier-ftl-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-ftl-status="all">All</button>
                    <button type="button" class="courier-ftl-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-ftl-status="draft">Draft</button>
                    <button type="button" class="courier-ftl-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-ftl-status="booked">Booked</button>
                    <button type="button" class="courier-ftl-filter-btn rounded-xl px-4 py-2 text-sm font-semibold" data-ftl-status="cancelled">Cancelled</button>
                </div>
                <div id="courier-ftl-orders-actions" class="hidden flex flex-wrap items-center gap-2 rounded-2xl border border-indigo-100 bg-indigo-50 p-3">
                    <span id="courier-ftl-orders-selected-count" class="mr-2 text-sm font-medium text-indigo-900">0 selected</span>
                    <button type="button" id="courier-ftl-edit-action" class="rounded-xl bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-100">Edit</button>
                    <button type="button" id="courier-ftl-cancel-action" class="rounded-xl bg-orange-600 px-4 py-2 text-sm font-semibold text-white hover:bg-orange-700">Cancel</button>
                    <button type="button" id="courier-ftl-delete-action" class="rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Delete</button>
                </div>
            </div>
        </div>
        <div id="courier-ftl-orders-list" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
    </div>
</section>
