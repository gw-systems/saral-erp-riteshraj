<div id="courier-toast-container" class="pointer-events-none fixed right-4 top-4 z-[120] space-y-2"></div>

<div id="courier-warehouse-modal" class="courier-modal hidden fixed inset-0 z-[90] bg-slate-950/50 p-4">
    <div class="mx-auto flex min-h-full max-w-2xl items-center justify-center">
        <div class="w-full max-h-[92vh] overflow-y-auto rounded-3xl bg-white shadow-2xl">
            <div class="sticky top-0 flex items-center justify-between border-b border-gray-200 bg-white px-6 py-4">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900">Add Warehouse</h2>
                    <p class="text-sm text-gray-500">This creates a courier-only warehouse used for booking and sync.</p>
                </div>
                <button type="button" class="rounded-full p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700" data-close-modal="courier-warehouse-modal">X</button>
            </div>
            <form id="courier-warehouse-form" class="space-y-4 p-6">
                <div class="grid gap-4 md:grid-cols-2">
                    <label class="space-y-1"><span class="text-sm font-medium text-gray-700">Warehouse Name</span><input name="name" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                    <label class="space-y-1"><span class="text-sm font-medium text-gray-700">Contact Name</span><input name="contact_name" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                    <label class="space-y-1"><span class="text-sm font-medium text-gray-700">Contact Number</span><input name="contact_no" required maxlength="10" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                    <label class="space-y-1"><span class="text-sm font-medium text-gray-700">Pincode</span><input name="pincode" required maxlength="6" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                    <label class="space-y-1"><span class="text-sm font-medium text-gray-700">City</span><input name="city" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                    <label class="space-y-1"><span class="text-sm font-medium text-gray-700">State</span><input name="state" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                    <label class="space-y-1 md:col-span-2"><span class="text-sm font-medium text-gray-700">Address</span><textarea name="address" rows="2" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></textarea></label>
                    <label class="space-y-1 md:col-span-2"><span class="text-sm font-medium text-gray-700">Address 2</span><textarea name="address_2" rows="2" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></textarea></label>
                    <label class="space-y-1 md:col-span-2"><span class="text-sm font-medium text-gray-700">GST Number</span><input name="gst_number" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                </div>
                <div class="flex justify-end gap-3 border-t border-gray-200 pt-4">
                    <button type="button" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50" data-close-modal="courier-warehouse-modal">Cancel</button>
                    <button type="submit" class="rounded-xl bg-blue-600 px-5 py-2 text-sm font-semibold text-white hover:bg-blue-700">Save Warehouse</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="courier-warehouse-link-modal" class="courier-modal hidden fixed inset-0 z-[90] bg-slate-950/50 p-4">
    <div class="mx-auto flex min-h-full max-w-lg items-center justify-center">
        <div class="w-full rounded-3xl bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-gray-200 px-6 py-4">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900">Link Existing ShipDaak IDs</h2>
                    <p id="courier-warehouse-link-name" class="text-sm text-gray-500">-</p>
                </div>
                <button type="button" class="rounded-full p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700" data-close-modal="courier-warehouse-link-modal">X</button>
            </div>
            <form id="courier-warehouse-link-form" class="space-y-4 p-6">
                <input id="courier-warehouse-link-id" type="hidden">
                <p class="rounded-2xl border border-blue-100 bg-blue-50 px-4 py-3 text-sm text-blue-900">This does not create anything in ShipDaak. It only saves the existing ShipDaak pickup and RTO IDs on this local warehouse.</p>
                <label class="space-y-1"><span class="text-sm font-medium text-gray-700">ShipDaak Pickup ID</span><input id="courier-warehouse-link-pickup" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                <label class="space-y-1"><span class="text-sm font-medium text-gray-700">ShipDaak RTO ID</span><input id="courier-warehouse-link-rto" required class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></label>
                <div class="flex justify-end gap-3 border-t border-gray-200 pt-4">
                    <button type="button" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50" data-close-modal="courier-warehouse-link-modal">Cancel</button>
                    <button type="submit" class="rounded-xl bg-blue-600 px-5 py-2 text-sm font-semibold text-white hover:bg-blue-700">Save Linked IDs</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="courier-order-details-modal" class="courier-modal hidden fixed inset-0 z-[90] bg-slate-950/50 p-4">
    <div class="mx-auto flex min-h-full max-w-5xl items-center justify-center">
        <div class="w-full max-h-[92vh] overflow-y-auto rounded-3xl bg-white shadow-2xl">
            <div class="sticky top-0 flex items-center justify-between border-b border-gray-200 bg-white px-6 py-4">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900">Order Details</h2>
                    <p id="courier-order-details-subtitle" class="text-sm text-gray-500">-</p>
                </div>
                <button type="button" class="rounded-full p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700" data-close-modal="courier-order-details-modal">X</button>
            </div>
            <div id="courier-order-details-content" class="grid gap-4 p-6 md:grid-cols-2"></div>
        </div>
    </div>
</div>

<div id="courier-tracking-modal" class="courier-modal hidden fixed inset-0 z-[90] bg-slate-950/50 p-4">
    <div class="mx-auto flex min-h-full max-w-2xl items-center justify-center">
        <div class="w-full max-h-[92vh] overflow-y-auto rounded-3xl bg-white shadow-2xl">
            <div class="sticky top-0 flex items-center justify-between border-b border-gray-200 bg-white px-6 py-4">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900">Tracking Timeline</h2>
                    <p id="courier-tracking-subtitle" class="text-sm text-gray-500">-</p>
                </div>
                <button type="button" class="rounded-full p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700" data-close-modal="courier-tracking-modal">X</button>
            </div>
            <div id="courier-tracking-content" class="space-y-4 p-6"></div>
        </div>
    </div>
</div>
