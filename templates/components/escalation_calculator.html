<!-- Escalation Rate Calculator — Draggable Floating Panel -->
<!-- Include in base.html. Trigger with: onclick="toggleEscCalc()" -->

<!-- Calculator Panel — Draggable -->
<div id="esc-calc-panel" class="fixed z-[71] hidden select-none" style="top: 120px; right: 16px; width: 380px;">
    <div class="rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.15),0_0_0_1px_rgba(0,0,0,0.05)] overflow-hidden">

        <!-- ═══ Drag Handle + Header ═══ -->
        <div id="esc-calc-header" class="bg-gradient-to-br from-blue-600 via-blue-700 to-blue-800 px-5 py-4 cursor-move relative overflow-hidden">
            <!-- Subtle pattern overlay -->
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 20% 50%, white 1px, transparent 1px); background-size: 20px 20px;"></div>
            <div class="relative flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-inner">
                        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <div class="text-white font-bold text-sm tracking-wide">Escalation Calculator</div>
                        <div class="text-white/50 text-[10px] font-medium mt-0.5 flex items-center gap-1">
                            <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4" /></svg>
                            Drag to move
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-0.5">
                    <button onclick="resetEsc()" class="text-white/50 hover:text-white hover:bg-white/15 rounded-lg p-2 cursor-pointer transition-all duration-150" aria-label="Reset" title="Reset">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                    <button onclick="toggleEscCalc()" class="text-white/50 hover:text-white hover:bg-white/15 rounded-lg p-2 cursor-pointer transition-all duration-150" aria-label="Close">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- ═══ Input Section — 3 columns, centre aligned ═══ -->
        <div class="bg-white px-5 py-5">
            <div class="grid grid-cols-3 gap-3">

                <!-- Col 1: Initial Rate -->
                <div class="flex flex-col items-center text-center group">
                    <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center mb-2.5">
                        <span class="text-blue-600 text-base font-bold">&#8377;</span>
                    </div>
                    <label for="esc-initial-rate" class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2 cursor-pointer group-hover:text-gray-700 transition-colors">Initial Rate</label>
                    <div class="relative w-full">
                        <span class="absolute inset-y-0 left-0 pl-2.5 flex items-center text-gray-400 text-[11px] font-medium pointer-events-none">&#8377;</span>
                        <input type="number" id="esc-initial-rate" step="0.01" min="0" placeholder="0.00"
                               class="w-full h-10 pl-6 pr-2 text-center text-sm font-bold text-gray-900 bg-gray-50 border border-gray-200 rounded-xl placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-400 focus:bg-white tabular-nums transition-all duration-150"
                               oninput="calcEsc()">
                    </div>
                </div>

                <!-- Col 2: Escalation % -->
                <div class="flex flex-col items-center text-center group">
                    <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center mb-2.5">
                        <svg class="w-5 h-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                    </div>
                    <label for="esc-annual-pct" class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2 cursor-pointer group-hover:text-gray-700 transition-colors">Escalation %</label>
                    <div class="relative w-full">
                        <input type="number" id="esc-annual-pct" step="0.01" min="0" max="100" placeholder="0"
                               class="w-full h-10 pl-2 pr-7 text-center text-sm font-bold text-gray-900 bg-gray-50 border border-gray-200 rounded-xl placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-400 focus:bg-white tabular-nums transition-all duration-150"
                               oninput="calcEsc()">
                        <span class="absolute inset-y-0 right-0 pr-2.5 flex items-center text-gray-400 text-[11px] font-medium pointer-events-none">%</span>
                    </div>
                </div>

                <!-- Col 3: No. of Years -->
                <div class="flex flex-col items-center text-center group">
                    <div class="w-10 h-10 rounded-xl bg-sky-100 flex items-center justify-center mb-2.5">
                        <svg class="w-5 h-5 text-sky-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <label for="esc-years" class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2 cursor-pointer group-hover:text-gray-700 transition-colors">No. of Years</label>
                    <div class="relative w-full">
                        <input type="number" id="esc-years" step="1" min="0" max="50" placeholder="0"
                               class="w-full h-10 pl-2 pr-2 text-center text-sm font-bold text-gray-900 bg-gray-50 border border-gray-200 rounded-xl placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-400 focus:bg-white tabular-nums transition-all duration-150"
                               oninput="calcEsc()">
                    </div>
                </div>

            </div>
        </div>

        <!-- ═══ Result Section ═══ -->
        <div id="esc-result-row" class="bg-gradient-to-br from-blue-600 via-blue-700 to-blue-800 relative overflow-hidden">
            <!-- Pattern overlay matching header -->
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 80% 50%, white 1px, transparent 1px); background-size: 20px 20px;"></div>
            <div class="relative px-5 py-5">
                <div class="text-center">
                    <div class="text-white/60 text-xs font-semibold uppercase tracking-widest mb-2">Present Rate</div>
                    <div class="flex items-center justify-center gap-2">
                        <span class="text-white/60 text-lg font-medium">&#8377;</span>
                        <span id="esc-result" class="text-3xl font-black text-white tabular-nums tracking-tight">0.00</span>
                    </div>
                    <div id="esc-pct-badge-wrap" class="hidden mt-2">
                        <span id="esc-pct-badge" class="inline-flex items-center gap-1 text-xs font-bold px-3 py-1 rounded-full bg-white/20 text-white backdrop-blur-sm">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                            <span id="esc-pct-text">+0%</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ Year-wise Breakdown (collapsible) ═══ -->
        <div id="esc-breakdown" class="hidden">
            <div class="bg-white border-t border-gray-100">
                <div class="max-h-48 overflow-y-auto">
                    <table class="w-full">
                        <thead class="sticky top-0">
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="px-4 py-2.5 text-center text-[10px] font-bold text-gray-400 uppercase tracking-wider">Year</th>
                                <th class="px-4 py-2.5 text-center text-[10px] font-bold text-gray-400 uppercase tracking-wider">Rate</th>
                                <th class="px-4 py-2.5 text-center text-[10px] font-bold text-gray-400 uppercase tracking-wider">Increase</th>
                                <th class="px-4 py-2.5 text-center text-[10px] font-bold text-gray-400 uppercase tracking-wider">Total %</th>
                            </tr>
                        </thead>
                        <tbody id="esc-breakdown-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
/* ── Toggle calculator visibility ── */
function toggleEscCalc() {
    var panel = document.getElementById('esc-calc-panel');
    var isHidden = panel.classList.contains('hidden');
    panel.classList.toggle('hidden');
    if (isHidden) {
        var firstInput = document.getElementById('esc-initial-rate');
        if (firstInput && !firstInput.value) firstInput.focus();
    }
}

/* ── Close on Escape key ── */
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var panel = document.getElementById('esc-calc-panel');
        if (panel && !panel.classList.contains('hidden')) toggleEscCalc();
    }
});

/* ── Click outside to close ── */
document.addEventListener('mousedown', function(e) {
    var panel = document.getElementById('esc-calc-panel');
    if (panel && !panel.classList.contains('hidden')) {
        if (!panel.contains(e.target) && !e.target.closest('[onclick*="toggleEscCalc"]')) {
            toggleEscCalc();
        }
    }
});

/* ── Drag functionality ── */
(function() {
    var panel = document.getElementById('esc-calc-panel');
    var header = document.getElementById('esc-calc-header');
    var isDragging = false;
    var offsetX = 0, offsetY = 0;

    header.addEventListener('mousedown', function(e) {
        if (e.target.closest('button')) return;
        isDragging = true;
        var rect = panel.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        panel.style.transition = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var x = e.clientX - offsetX;
        var y = e.clientY - offsetY;
        var maxX = window.innerWidth - panel.offsetWidth;
        var maxY = window.innerHeight - 40;
        x = Math.max(0, Math.min(x, maxX));
        y = Math.max(0, Math.min(y, maxY));
        panel.style.left = x + 'px';
        panel.style.top = y + 'px';
        panel.style.right = 'auto';
    });

    document.addEventListener('mouseup', function() {
        if (isDragging) {
            isDragging = false;
            panel.style.transition = '';
        }
    });

    /* Touch support */
    header.addEventListener('touchstart', function(e) {
        if (e.target.closest('button')) return;
        isDragging = true;
        var touch = e.touches[0];
        var rect = panel.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        panel.style.transition = 'none';
    }, {passive: true});

    document.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var touch = e.touches[0];
        var x = touch.clientX - offsetX;
        var y = touch.clientY - offsetY;
        var maxX = window.innerWidth - panel.offsetWidth;
        var maxY = window.innerHeight - 40;
        x = Math.max(0, Math.min(x, maxX));
        y = Math.max(0, Math.min(y, maxY));
        panel.style.left = x + 'px';
        panel.style.top = y + 'px';
        panel.style.right = 'auto';
    }, {passive: true});

    document.addEventListener('touchend', function() {
        if (isDragging) {
            isDragging = false;
            panel.style.transition = '';
        }
    });
})();

/* ── Calculate escalation ── */
function calcEsc() {
    var rate = parseFloat(document.getElementById('esc-initial-rate').value);
    var pct = parseFloat(document.getElementById('esc-annual-pct').value);
    var years = parseInt(document.getElementById('esc-years').value);
    var resultEl = document.getElementById('esc-result');
    var resultRow = document.getElementById('esc-result-row');
    var pctWrap = document.getElementById('esc-pct-badge-wrap');
    var pctText = document.getElementById('esc-pct-text');
    var breakdownEl = document.getElementById('esc-breakdown');
    var tbody = document.getElementById('esc-breakdown-body');

    if (isNaN(rate) || isNaN(pct) || isNaN(years) || rate < 0 || pct < 0 || years < 0) {
        resultEl.textContent = '0.00';
        resultRow.className = 'bg-gradient-to-br from-blue-600 via-blue-700 to-blue-800 relative overflow-hidden';
        pctWrap.classList.add('hidden');
        breakdownEl.classList.add('hidden');
        return;
    }

    var presentRate = rate * Math.pow(1 + pct / 100, years);
    resultEl.textContent = presentRate.toFixed(2);

    var totalPct = rate > 0 ? ((presentRate - rate) / rate) * 100 : 0;
    if (totalPct > 0) {
        pctText.textContent = '+' + totalPct.toFixed(1) + '%';
        pctWrap.classList.remove('hidden');
        if (totalPct > 50) {
            resultRow.className = 'bg-gradient-to-br from-red-500 via-red-600 to-rose-700 relative overflow-hidden';
        } else if (totalPct > 20) {
            resultRow.className = 'bg-gradient-to-br from-amber-500 via-amber-600 to-orange-600 relative overflow-hidden';
        } else {
            resultRow.className = 'bg-gradient-to-br from-emerald-500 via-emerald-600 to-teal-600 relative overflow-hidden';
        }
    } else {
        pctWrap.classList.add('hidden');
        resultRow.className = 'bg-gradient-to-br from-blue-600 via-blue-700 to-blue-800 relative overflow-hidden';
    }

    /* Year-wise breakdown */
    if (years > 0 && years <= 30) {
        var html = '';
        var prev = rate;
        for (var i = 1; i <= years; i++) {
            var yr = rate * Math.pow(1 + pct / 100, i);
            var inc = yr - prev;
            var cumPct = ((yr - rate) / rate) * 100;
            var isLast = i === years;
            var bg = isLast ? 'bg-blue-50/80' : (i % 2 === 0 ? 'bg-gray-50/50' : 'bg-white');
            var fw = isLast ? 'font-bold' : 'font-medium';
            html += '<tr class="' + bg + ' border-b border-gray-50">';
            html += '<td class="px-4 py-2 text-center text-gray-500 text-xs ' + fw + '">' + i + '</td>';
            html += '<td class="px-4 py-2 text-center text-gray-800 tabular-nums text-xs ' + fw + '">&#8377; ' + yr.toFixed(2) + '</td>';
            html += '<td class="px-4 py-2 text-center text-emerald-600 tabular-nums text-xs ' + fw + '">+' + inc.toFixed(2) + '</td>';
            var pillColor = cumPct > 50 ? 'text-red-500 bg-red-50' : cumPct > 20 ? 'text-amber-600 bg-amber-50' : 'text-emerald-600 bg-emerald-50';
            html += '<td class="px-4 py-2 text-center tabular-nums text-xs">';
            html += '<span class="' + pillColor + ' ' + fw + ' inline-block px-1.5 py-0.5 rounded text-[10px]">' + cumPct.toFixed(1) + '%</span></td>';
            html += '</tr>';
            prev = yr;
        }
        tbody.innerHTML = html;
        breakdownEl.classList.remove('hidden');
    } else {
        breakdownEl.classList.add('hidden');
    }
}

/* ── Reset all fields ── */
function resetEsc() {
    document.getElementById('esc-initial-rate').value = '';
    document.getElementById('esc-annual-pct').value = '';
    document.getElementById('esc-years').value = '';
    calcEsc();
}
</script>
