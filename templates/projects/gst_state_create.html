{% extends 'base.html' %}

{% block title %}Add GST State{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Add New GST State</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="space-y-4">
                <!-- State Code -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        State Code <span class="text-red-600">*</span>
                    </label>
                    <input type="text" name="state_code" maxlength="2" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 uppercase"
                           placeholder="e.g., MH, GJ, KA">
                    <p class="text-xs text-gray-500 mt-1">2-letter state code (will be auto-capitalized)</p>
                </div>

                <!-- State Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        State Name <span class="text-red-600">*</span>
                    </label>
                    <input type="text" name="state_name" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                           placeholder="e.g., Maharashtra, Gujarat">
                </div>

                <!-- GST Number -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        GST Number <span class="text-red-600">*</span>
                    </label>
                    <input type="text" name="gst_number" maxlength="15" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono"
                           placeholder="e.g., 27AAGCG3326A1Z5">
                    <p class="text-xs text-gray-500 mt-1">15-character GST registration number</p>
                </div>

                <!-- Registration Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Registration Date (Optional)
                    </label>
                    <input type="date" name="registration_date"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex space-x-3 mt-6 pt-6 border-t">
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                    Save GST State
                </button>
                <a href="{% url 'projects:gst_state_list' %}" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
