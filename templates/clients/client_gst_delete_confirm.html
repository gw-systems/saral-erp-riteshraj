{% extends 'base.html' %}
{% load static %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}

<div class="min-h-screen bg-gradient-to-br from-red-50 via-white to-gray-50 py-8 px-4">
    <div class="max-w-2xl mx-auto">
        
        <!-- Warning Card -->
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
                    <svg width="32" height="32" aria-hidden="true" class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Delete GST Entity</h1>
                <p class="text-gray-600">This action will permanently delete this GST entity</p>
            </div>

            <!-- GST Info -->
            <div class="bg-gray-50 rounded-lg p-4 mb-6">
                <p class="text-sm text-gray-600 mb-1">GST Number</p>
                <p class="text-lg font-semibold text-gray-900">{{ gst.client_gst_number }}</p>
                <p class="text-sm text-gray-600 mt-2">{{ gst.client_gst_state_name }}</p>
            </div>

            <!-- Action Buttons -->
            <form method="POST" class="flex gap-4">
                {% csrf_token %}
                <button type="submit" class="flex-1 px-6 py-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition shadow-md hover:shadow-lg">
                    Yes, Delete GST Entity
                </button>
                <a href="{% url 'projects:client_card_detail' client.client_code %}" class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition text-center">
                    Cancel
                </a>
            </form>
        </div>

    </div>
</div>
{% endblock %}
