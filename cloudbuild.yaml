# Cloud Build configuration for Saral ERP
# This file automates the build and deployment process to Cloud Run

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/saral-erp:$COMMIT_SHA', '.']
    id: 'build-image'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/saral-erp:$COMMIT_SHA']
    id: 'push-image'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'saral-erp'
      - '--image=gcr.io/$PROJECT_ID/saral-erp:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_CLOUD_SQL_CONNECTION_NAME}'
      - '--set-env-vars=USE_CLOUD_SQL=true,CLOUD_SQL_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION_NAME},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER},DEBUG=false'
      - '--set-secrets=SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest,REDIS_URL=redis-url:latest,ZOHO_CLIENT_ID=zoho-client-id:latest,ZOHO_CLIENT_SECRET=zoho-client-secret:latest'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--max-instances=10'
      - '--min-instances=0'
    id: 'deploy-to-cloud-run'

  # Step 4: Run database migrations
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'saral-erp-migrate'
      - '--region=us-central1'
      - '--wait'
    id: 'run-migrations'

# Images to be pushed to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/saral-erp:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/saral-erp:latest'

# Substitution variables (can be overridden)
substitutions:
  _CLOUD_SQL_CONNECTION_NAME: 'your-project:region:instance-name'
  _DB_NAME: 'erp'
  _DB_USER: 'admin'

# Build timeout (in seconds)
timeout: '1200s'

# Options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
